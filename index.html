<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>국기·나라·수도 매칭 퀴즈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --primary: #3b6ea5;
      --primary-light: #eff6ff;
      --primary-border: #93c5fd;
      --accent: #2563eb;
      --shadow: 0 4px 20px rgba(59, 110, 165, 0.1);
      --shadow-sm: 0 2px 8px rgba(59, 110, 165, 0.08);
      --radius: 16px;
      --radius-btn: 12px;
      --touch-min: 48px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 1rem;
      min-height: 100vh;
      font-size: 16px;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
    }

    /* 태블릿 이상: 카드 너비 확장 */
    @media (min-width: 600px) {
      body {
        padding: 1.5rem;
      }

      .container {
        max-width: 520px;
      }
    }

    @media (min-width: 768px) {
      .container {
        max-width: 560px;
      }
    }

    /* 파일 공유 안내 */
    .share-tip {
      background: #e0f2fe;
      border: 1px solid #bae6fd;
      border-radius: var(--radius-btn);
      padding: 0.65rem 0.9rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      color: #0369a1;
      line-height: 1.5;
    }

    .page-title {
      text-align: center;
      margin-bottom: 1.25rem;
    }

    .page-title h1 {
      font-size: clamp(1.25rem, 4vw, 1.5rem);
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 0.35rem;
    }

    .page-title p {
      font-size: clamp(0.875rem, 2.5vw, 0.95rem);
      color: var(--text-muted);
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      border-radius: var(--radius-btn);
      padding: 0.85rem 1.1rem;
      margin-bottom: 0.85rem;
      font-size: clamp(0.9rem, 2.5vw, 1rem);
      font-weight: 600;
      box-shadow: var(--shadow-sm);
    }

    .status-bar .score {
      color: var(--accent);
    }

    .quiz-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: clamp(1.25rem, 4vw, 1.75rem);
      box-shadow: var(--shadow);
    }

    .quiz-card .flag {
      font-size: clamp(3.2rem, 14vw, 5rem);
      text-align: center;
      line-height: 1.2;
      margin-bottom: 0.6rem;
    }

    .quiz-card .country-hint {
      text-align: center;
      font-size: clamp(1.1rem, 3.5vw, 1.3rem);
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .quiz-card .question-text {
      text-align: center;
      font-size: clamp(0.9rem, 2.5vw, 1rem);
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .feedback {
      text-align: center;
      font-size: clamp(0.875rem, 2.5vw, 0.95rem);
      font-weight: 600;
      min-height: 1.5rem;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #e2e8f0;
      transition: opacity 0.2s ease;
    }

    .feedback.correct-msg { color: #166534; }
    .feedback.wrong-msg   { color: #991b1b; }

    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(0.65rem, 2vw, 0.85rem);
    }

    .choices .choice-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: var(--touch-min);
      padding: 0.85rem 0.65rem;
      background: var(--primary-light);
      border: 2px solid #dbeafe;
      border-radius: var(--radius-btn);
      font-size: clamp(0.875rem, 3vw, 1.05rem);
      font-weight: 600;
      font-family: inherit;
      color: var(--text);
      cursor: pointer;
      word-break: keep-all;
      transition: border-color 0.18s ease, background 0.18s ease, transform 0.12s ease;
    }

    .choices .choice-btn:hover:not(:disabled) {
      border-color: var(--primary-border);
      background: #dbeafe;
    }

    .choices .choice-btn:active:not(:disabled) {
      transform: scale(0.97);
    }

    .choices .choice-btn:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }

    .choices .choice-btn.correct {
      background: #dcfce7;
      border-color: #86efac;
      color: #166534;
    }

    .choices .choice-btn.wrong {
      background: #fee2e2;
      border-color: #fca5a5;
      color: #991b1b;
    }

    .choices .choice-btn:disabled {
      cursor: default;
      opacity: 0.9;
    }

    .action-btn {
      width: 100%;
      margin-top: 1rem;
      padding: 0.95rem;
      min-height: var(--touch-min);
      border: none;
      border-radius: var(--radius-btn);
      font-size: clamp(0.95rem, 2.5vw, 1.05rem);
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.12s ease;
    }

    .action-btn:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }

    .action-btn:active {
      transform: scale(0.98);
    }

    .next-btn {
      display: none;
      background: var(--accent);
      color: #fff;
    }

    .next-btn:hover {
      background: #1d4ed8;
    }

    .summary-card {
      display: none;
      background: var(--surface);
      border-radius: var(--radius);
      padding: clamp(1.5rem, 5vw, 2.5rem);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .summary-card.show {
      display: block;
    }

    .summary-card h2 {
      font-size: clamp(1.2rem, 4vw, 1.4rem);
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .summary-card .final-score {
      font-size: clamp(2rem, 8vw, 2.75rem);
      font-weight: 700;
      color: var(--accent);
      margin: 1rem 0;
    }

    .summary-card .summary-msg {
      font-size: clamp(0.9rem, 2.5vw, 1rem);
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .summary-actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .restart-btn {
      background: var(--primary);
      color: #fff;
    }

    .restart-btn:hover {
      background: #2d5a87;
    }

    .retry-wrong-btn {
      display: none;
      background: #fff;
      color: var(--primary);
      border: 2px solid var(--primary);
    }

    .retry-wrong-btn:hover {
      background: var(--primary-light);
    }

    .retry-wrong-btn.show {
      display: block;
    }

    .hidden {
      display: none !important;
    }

    /* 아주 작은 화면: 보기 1열 */
    @media (max-width: 360px) {
      .choices {
        grid-template-columns: 1fr;
      }
    }

    /* 태블릿: 보기 간격·버튼 크기 확대 */
    @media (min-width: 600px) {
      .choices {
        gap: 1rem;
      }

      .choices .choice-btn {
        min-height: 56px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- 학생 공유 안내 -->
    <p class="share-tip">
      📎 이 HTML 파일을 그대로 복사해 학생에게 보내면, 브라우저에서 바로 퀴즈를 풀 수 있습니다.
    </p>

    <header class="page-title">
      <h1>국기·나라·수도 매칭 퀴즈</h1>
      <p>국기와 나라를 보고 수도를 맞혀 보세요.</p>
    </header>

    <div id="quiz-area">
      <div class="status-bar" aria-label="퀴즈 진행 상태">
        <span id="progress-display" class="progress">문제 1 / 5</span>
        <span id="score-display" class="score">점수 0</span>
      </div>

      <section class="quiz-card" aria-label="퀴즈">
        <div id="flag-display" class="flag"></div>
        <p id="country-hint" class="country-hint"></p>
        <p class="question-text">이 나라의 수도는?</p>

        <p id="feedback" class="feedback" aria-live="polite"></p>

        <div class="choices" aria-label="보기 선택">
          <button type="button" class="choice-btn" data-index="0"></button>
          <button type="button" class="choice-btn" data-index="1"></button>
          <button type="button" class="choice-btn" data-index="2"></button>
          <button type="button" class="choice-btn" data-index="3"></button>
        </div>

        <button type="button" id="next-btn" class="action-btn next-btn">다음 문제</button>
      </section>
    </div>

    <section id="summary-card" class="summary-card" aria-label="퀴즈 결과">
      <h2>퀴즈 완료!</h2>
      <p class="summary-msg">모든 문제를 풀었습니다.</p>
      <p class="final-score" id="final-score">0 / 5</p>
      <p id="summary-comment" class="summary-msg"></p>

      <div class="summary-actions">
        <button type="button" id="retry-wrong-btn" class="action-btn retry-wrong-btn">
          틀린 문제만 다시 풀기
        </button>
        <button type="button" id="restart-btn" class="action-btn restart-btn">
          처음부터 다시 하기
        </button>
      </div>
    </section>

  </div>

  <script>
    // 전체 퀴즈 데이터
    const allQuizData = [
      { id: 1, flag: "🇰🇷", country: "한국", correct: "서울", wrong: ["도쿄", "베이징", "방콕"] },
      { id: 2, flag: "🇯🇵", country: "일본", correct: "도쿄", wrong: ["서울", "오사카", "베이징"] },
      { id: 3, flag: "🇫🇷", country: "프랑스", correct: "파리", wrong: ["베를린", "마드리드", "로마"] },
      { id: 4, flag: "🇧🇷", country: "브라질", correct: "브라질리아", wrong: ["리우데자네이루", "상파울루", "부에노스아이레스"] },
      { id: 5, flag: "🇪🇬", country: "이집트", correct: "카이로", wrong: ["알렉산드리아", "나이로비", "리야드"] }
    ];

    let quizData = [...allQuizData];
    let currentIndex = 0;
    let score = 0;
    let answered = false;
    let wrongIds = [];       // 틀린 문제 id 목록
    let isRetryMode = false; // 틀린 문제만 다시 풀기 모드

    const flagDisplay = document.getElementById("flag-display");
    const countryHint = document.getElementById("country-hint");
    const feedbackEl = document.getElementById("feedback");
    const choiceBtns = document.querySelectorAll(".choice-btn");
    const nextBtn = document.getElementById("next-btn");
    const progressDisplay = document.getElementById("progress-display");
    const scoreDisplay = document.getElementById("score-display");
    const quizArea = document.getElementById("quiz-area");
    const summaryCard = document.getElementById("summary-card");
    const finalScoreEl = document.getElementById("final-score");
    const summaryComment = document.getElementById("summary-comment");
    const restartBtn = document.getElementById("restart-btn");
    const retryWrongBtn = document.getElementById("retry-wrong-btn");

    function shuffleArray(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function showQuestion(index) {
      const question = quizData[index];
      answered = false;

      flagDisplay.textContent = question.flag;
      countryHint.textContent = question.country;
      feedbackEl.textContent = "";
      feedbackEl.className = "feedback";

      const choices = shuffleArray([question.correct, ...question.wrong]);
      choiceBtns.forEach((btn, i) => {
        btn.textContent = choices[i];
        btn.className = "choice-btn";
        btn.disabled = false;
      });

      nextBtn.style.display = "none";
      nextBtn.textContent = index < quizData.length - 1 ? "다음 문제" : "결과 보기";

      progressDisplay.textContent = `문제 ${index + 1} / ${quizData.length}`;
      scoreDisplay.textContent = `점수 ${score}`;
    }

    function handleChoice(clickedBtn) {
      if (answered) return;
      answered = true;

      const question = quizData[currentIndex];
      const selected = clickedBtn.textContent;
      const isCorrect = selected === question.correct;

      choiceBtns.forEach((btn) => {
        btn.disabled = true;
        if (btn.textContent === question.correct) {
          btn.classList.add("correct");
        } else if (btn === clickedBtn && !isCorrect) {
          btn.classList.add("wrong");
        }
      });

      if (isCorrect) {
        score++;
        scoreDisplay.textContent = `점수 ${score}`;
        feedbackEl.textContent = "정답입니다! 잘했어요.";
        feedbackEl.className = "feedback correct-msg";
      } else {
        // 틀린 문제 id 기록 (중복 방지)
        if (!wrongIds.includes(question.id)) {
          wrongIds.push(question.id);
        }
        feedbackEl.textContent = `틀렸습니다. 정답은 ${question.correct}입니다.`;
        feedbackEl.className = "feedback wrong-msg";
      }

      nextBtn.style.display = "block";
    }

    function goNext() {
      if (currentIndex < quizData.length - 1) {
        currentIndex++;
        showQuestion(currentIndex);
      } else {
        showSummary();
      }
    }

    function showSummary() {
      quizArea.classList.add("hidden");
      summaryCard.classList.add("show");

      finalScoreEl.textContent = `${score} / ${quizData.length}`;

      const ratio = score / quizData.length;
      if (ratio === 1) {
        summaryComment.textContent = "만점! 세계 수도를 잘 알고 있네요.";
      } else if (ratio >= 0.6) {
        summaryComment.textContent = "잘했어요! 조금만 더 복습해 봐요.";
      } else {
        summaryComment.textContent = "다시 한번 도전해 볼까요?";
      }

      // 틀린 문제가 있으면 '틀린 문제만 다시 풀기' 버튼 표시
      if (wrongIds.length > 0 && !isRetryMode) {
        retryWrongBtn.classList.add("show");
        retryWrongBtn.textContent = `틀린 문제만 다시 풀기 (${wrongIds.length}문제)`;
      } else {
        retryWrongBtn.classList.remove("show");
      }
    }

    function restartQuiz() {
      quizData = [...allQuizData];
      currentIndex = 0;
      score = 0;
      wrongIds = [];
      isRetryMode = false;
      quizArea.classList.remove("hidden");
      summaryCard.classList.remove("show");
      retryWrongBtn.classList.remove("show");
      showQuestion(0);
    }

    function retryWrongQuestions() {
      quizData = allQuizData.filter((q) => wrongIds.includes(q.id));
      currentIndex = 0;
      score = 0;
      isRetryMode = true;
      quizArea.classList.remove("hidden");
      summaryCard.classList.remove("show");
      retryWrongBtn.classList.remove("show");
      showQuestion(0);
    }

    choiceBtns.forEach((btn) => {
      btn.addEventListener("click", () => handleChoice(btn));
    });
    nextBtn.addEventListener("click", goNext);
    restartBtn.addEventListener("click", restartQuiz);
    retryWrongBtn.addEventListener("click", retryWrongQuestions);

    showQuestion(0);
  </script>
</body>
</html>
